name: 'AI Function & Schema Validator'

inputs:
  func_path:
    description: 'Полный путь к .py файлу'
    required: true
  schema_path:
    description: 'Полный путь к .json файлу'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true

    - name: Install Python dependencies
      shell: bash
      run: |
        cd ${{ github.action_path }}
        uv sync
      
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    - name: Run Function Validation
      shell: bash
      run: |
        # Прокидываем путь к твоему движку, чтобы импорты src работали
        export PYTHONPATH=$PYTHONPATH:${{ github.action_path }}
        
        # Запускаем скрипт. ВАЖНО: аргументы должны быть как в твоем runner.py!
        # Мы также передаем папку для результатов
        cd ${{ github.action_path }}
        uv run python runner.py \
          --func "${{ github.workspace }}/${{ inputs.func_path }}" \
          --schema "${{ github.workspace }}/${{ inputs.schema_path }}" \
      continue-on-error: true # Позволяет сгенерировать отчет даже если тест упал

    - name: Generate Awesome Report
      shell: bash
      run: |
        # Берем данные из папки результатов функций и кладем в папку отчета функций
        npx allure-awesome generate ${{ github.workspace }}/allure-results-functions \
          --config ${{ github.action_path }}/allurerc.yaml \
          --output ${{ github.workspace }}/allure-report-functions