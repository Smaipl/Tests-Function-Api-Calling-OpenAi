name: Collect & Deploy All Reports

on:
  # Запускается, когда ЛЮБОЙ репо завершает workflow "Check My Functions"
  workflow_run:
    workflows: ["Check My Functions"]
    types:
      - completed

permissions:
  contents: read
  pages: write
  id-token: write
  actions: read # Право читать артефакты из других репо

jobs:
  collect-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 🔥 МАГИЯ: Скачиваем ВСЕ артефакты с префиксом "report-"
      # Они скачаются в разные папки, так как имена уникальны
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: report-*
          merge-multiple: false # Важно: не сливать файлы, а сохранить структуру папок
          path: ./raw-artifacts

      - name: Organize Reports
        run: |
          mkdir -p ./final-site
          
          # Проходим по всем скачанным папкам
          cd ./raw-artifacts
          for folder in report-*; do
            # Извлекаем имя репо из имени папки (убираем префикс report- и суффикс -run_id)
            # Пример имени: report-logg1n__my-repo-98765
            # Нам нужно сделать папку: logg1n__my-repo
            
            # Простой вариант: используем имя папки как есть (оно уникально)
            dest_name=$folder
            mkdir -p ../final-site/$dest_name
            cp -r $folder/* ../final-site/$dest_name/
          done

          # Генерируем главную страницу (index.html) со списком всех отчетов
          cd ../final-site
          echo "<html><head><title>Все отчеты команды</title><style>body{font-family:sans-serif;} ul{list-style:none;} li{margin:10px;}</style></head><body>" > index.html
          echo "<h1>📊 Отчеты валидации функций</h1>" >> index.html
          echo "<ul>" >> index.html
          
          for dir in */; do
            if [ "$dir" != "./" ]; then
              # Красивое имя для ссылки
              link_name=${dir%/}
              echo "<li>👉 <a href='$link_name/index.html'><b>$link_name</b></a> <small>(нажми для отчета)</small></li>" >> index.html
            fi
          done
          
          echo "</ul><br><p>Обновлено: $(date)</p></body></html>" >> index.html

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './final-site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
      
      - name: Show Result
        run: echo "✅ Общий сайт обновлен! Ссылка: ${{ steps.deployment.outputs.page_url }}"