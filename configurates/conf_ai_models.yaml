# Файл конфигуратор котоый будет создаваться в корне репозитория функции вместе с шаблоно оргнизации
# В нем будут закомментированы  стандартные можели для использования котрые используются на платформе SMAIPL
# По принцципу указанному ниже будут добавляться другие модели используеме разработчикм
# Учавстворвать в работе может только 1 модель

aggregator:
  name: OPENROUTER
  base_url: "https://openrouter.ai"
  models:
    name: "openai/gpt-4o-mini"
    semaphore: 25
    max_tokens: 1000
    temperature: 0.3
  role: "Ты инженер-программист. Твоя задача — строго следовать JSON-схеме и вызывать tools."
  timeout: 60
  tool_choice: "auto"

